<!DOCTYPE html>
<html lang="am">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sofi Bingo game</title>
<style>
body {
  background: #0b5ed7;
  color: white;
  font-family: Arial, sans-serif;
  text-align: center;
  padding: 30px;
}
h1 {
  color: gold;
}
.bingo {
  display: grid;
  grid-template-columns: repeat(5, 60px);
  gap: 8px;
  justify-content: center;
  margin-top: 30px;
}
.box {
  background: white;
  color: #0b5ed7;
  height: 60px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  border-radius: 8px;
}
button {
  margin-top: 25px;
  padding: 12px 25px;
  font-size: 18px;
  background: gold;
  border: none;
  border-radius: 8px;
}
</style>
</head>

<body>

<h1>🎯 Sofi Bingo</h1>
<p>እንኳን ወደ Sofi Bingo በደህና መጡ</p>

<div class="bingo">
<div class="box">1</div>
<div class="box">2</div>
<div class="box">3</div>
<div class="box">4</div>
<div class="box">5</div>
<div class="box">6</div>
<div class="box">7</div>
<div class="box">8</div>
<div class="box">9</div>
<div class="box">10</div>
<div class="box">11</div>
<div class="box">12</div>
<div class="box">13</div>
<div class="box">14</div>
<div class="box">15</div>
</div>

<button>ጀምር</button>

</body>
</html>
